# ===================================================================
# DOCKER PROFILE CONFIGURATIONS (Profile: docker)
# ===================================================================

# Docker PostgreSQL Connection
# spring.datasource.url=${DOCKER_DATASOURCE_URL:jdbc:postgresql://localhost:5433/58K_tellus?stringtype=unspecified}
# -spring.datasource.url=${DOCKER_DATASOURCE_URL:jdbc:postgresql://localhost:5433/58K_tellus?stringtype=unspecified}
spring.datasource.url=${DOCKER_DATASOURCE_URL:jdbc:postgresql://localhost:5433/58K_tellus?stringtype=unspecified&reWriteBatchedInserts=true}

spring.datasource.username=${DOCKER_DATASOURCE_USERNAME:admin}
spring.datasource.password=${DOCKER_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=${DOCKER_DATASOURCE_DRIVER:org.postgresql.Driver}

# FORCE stringtype=unspecified regardless of server URL (For JSON Types)
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# HikariCP Connection Pool Configuration (Specific for Docker Environment)
spring.datasource.hikari.maximum-pool-size=${MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${CONNECTION_TIMEOUT:5000}

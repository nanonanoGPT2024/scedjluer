# PostgreSQL Connection (Lokal Dev / VM Development)
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://10.0.3.230:5432/58K_tellus?currentSchema=public&stringtype=unspecified&tcpKeepAlive=true&reWriteBatchedInserts=true&socketTimeout=60}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:D1k4@p0stgres}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER:org.postgresql.Driver}

# FORCE stringtype=unspecified regardless of server URL (For JSON Types)
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# HikariCP Connection Pool Configuration (Specific for Dev Environment)
spring.datasource.hikari.maximum-pool-size=${MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${IDLE_TIMEOUT:60000}
spring.datasource.hikari.max-lifetime=${MAX_LIFETIME:120000}
spring.datasource.hikari.connection-timeout=${CONNECTION_TIMEOUT:5000}
spring.datasource.hikari.keepalive-time=${HIKARI_KEEPALIVE:30000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION:120000}

# Tomcat & MVC HTTP request timeouts (5 minutes)
server.connection-timeout=300000
spring.mvc.async.request-timeout=300000
